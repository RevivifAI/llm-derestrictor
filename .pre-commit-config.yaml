# See https://pre-commit.com for usage and https://pre-commit.com/hooks.html for available hooks.
# Install locally with: `pre-commit install`
# Run against all files with: `pre-commit run --all-files`

minimum_pre_commit_version: "4.6.0"
default_language_version:
  python: python3.12
default_install_hook_types: [pre-commit]
default_stages: [pre-commit]
fail_fast: false

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=20480"]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: check-json
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: ["--markdown-linebreak-ext=md"]
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      # Linter: place before the formatter so autofixes can be reformatted.
      - id: ruff-check
        args: ["--fix", "--exit-non-zero-on-fix"]
        types_or: [python, pyi]
      # Formatter: replaces Black.
      - id: ruff-format
        types_or: [python, pyi]
