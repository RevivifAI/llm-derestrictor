minimum_prek_version = "0.3.9"
default_language_version.python = "3.12"
default_install_hook_types = ["pre-commit"]
default_stages = ["pre-commit"]
fail_fast = false

# ---------------------------------------------------------------------------
# pre-commit/pre-commit-hooks
# ---------------------------------------------------------------------------
[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"

[[repos.hooks]]
id = "check-added-large-files"
args = ["--maxkb=20480"]

[[repos.hooks]]
id = "check-case-conflict"

[[repos.hooks]]
id = "check-merge-conflict"

[[repos.hooks]]
id = "check-toml"

[[repos.hooks]]
id = "check-yaml"

[[repos.hooks]]
id = "check-json"

[[repos.hooks]]
id = "check-executables-have-shebangs"

[[repos.hooks]]
id = "check-shebang-scripts-are-executable"

[[repos.hooks]]
id = "check-symlinks"

[[repos.hooks]]
id = "destroyed-symlinks"

[[repos.hooks]]
id = "detect-private-key"

[[repos.hooks]]
id = "end-of-file-fixer"

[[repos.hooks]]
id = "trailing-whitespace"
args = ["--markdown-linebreak-ext=md"]

[[repos.hooks]]
id = "mixed-line-ending"
args = ["--fix=lf"]

[[repos.hooks]]
id = "debug-statements"

# ---------------------------------------------------------------------------
# local
# ---------------------------------------------------------------------------
[[repos]]
repo = "local"

[[repos.hooks]]
id = "no-em-dash"
name = "Forbid em dashes (U+2014) in Python source"
language = "pygrep"
entry = "—"
types = ["python"]

# ---------------------------------------------------------------------------
# astral-sh/ruff-pre-commit
# ---------------------------------------------------------------------------
[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.11"

[[repos.hooks]]
id = "ruff-check"
args = ["--fix", "--exit-non-zero-on-fix"]
types_or = ["python", "pyi"]

[[repos.hooks]]
id = "ruff-format"
types_or = ["python", "pyi"]

# ---------------------------------------------------------------------------
# DetachHead/basedpyright-prek-mirror
# ---------------------------------------------------------------------------
[[repos]]
repo = "https://github.com/DetachHead/basedpyright-prek-mirror"
rev = "1.39.2"

[[repos.hooks]]
id = "basedpyright"
